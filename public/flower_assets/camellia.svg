<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 6 broad petals (60° intervals) -->
    <g transform="translate(100 100)" opacity="0.62">
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(0)" />
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(60)" />
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(120)" />
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(180)" />
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(240)" />
      <path d="M-28,4 C-38,-15 -35,-65 0,-84 C35,-65 38,-15 28,4Z" transform="rotate(300)" />
    </g>
    <!-- Middle 6 petals (offset 30°) -->
    <g transform="translate(100 100)" opacity="0.79">
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(30)" />
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(90)" />
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(150)" />
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(210)" />
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(270)" />
      <path d="M-20,4 C-28,-12 -26,-52 0,-68 C26,-52 28,-12 20,4Z" transform="rotate(330)" />
    </g>
    <!-- Inner 6 petals (same angle as outer) -->
    <g transform="translate(100 100)" opacity="0.93">
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(0)" />
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(60)" />
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(120)" />
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(180)" />
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(240)" />
      <path d="M-13,3 C-18,-8 -16,-38 0,-50 C16,-38 18,-8 13,3Z" transform="rotate(300)" />
    </g>
    <!-- Stamen center -->
    <circle cx="100" cy="100" r="20" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="10" fill="white" opacity="0.28" />
  </g>
</svg>
