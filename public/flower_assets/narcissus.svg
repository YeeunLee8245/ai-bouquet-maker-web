<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Narcissus/Daffodil: 6 outer petals + central trumpet corona -->
    <!-- Layer 1: 6 outer petals -->
    <g transform="translate(100 100)" opacity="0.58">
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(0)" />
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(60)" />
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(120)" />
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(180)" />
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(240)" />
      <path d="M-16,0 C-20,-15 -18,-48 -10,-72 C-5,-82 0,-85 0,-85 C0,-85 5,-82 10,-72 C18,-48 20,-15 16,0 C8,-4 -8,-4 -16,0Z" transform="rotate(300)" />
    </g>
    <!-- Layer 2: Inner petals (6 petals, 30° offset) -->
    <g transform="translate(100 100)" opacity="0.75">
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(30)" />
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(90)" />
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(150)" />
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(210)" />
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(270)" />
      <path d="M-12,0 C-14,-12 -12,-36 -7,-54 C-3,-62 0,-65 0,-65 C0,-65 3,-62 7,-54 C12,-36 14,-12 12,0 C6,-3 -6,-3 -12,0Z" transform="rotate(330)" />
    </g>
    <!-- Corona (trumpet) - ruffled circular rim -->
    <g transform="translate(100 100)" opacity="0.9">
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(0)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(45)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(90)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(135)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(180)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(225)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(270)" />
      <path d="M-8,0 C-10,-6 -8,-18 -5,-28 C-2,-34 0,-36 0,-36 C0,-36 2,-34 5,-28 C8,-18 10,-6 8,0 C4,-1 -4,-1 -8,0Z" transform="rotate(315)" />
    </g>
    <!-- Center -->
    <circle cx="100" cy="100" r="16" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="8" fill="white" opacity="0.3" />
  </g>
</svg>
