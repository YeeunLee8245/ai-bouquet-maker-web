<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 3 petals: wider, at 0°/120°/240° -->
    <g transform="translate(100 100)" opacity="0.64">
      <path d="M-18,5 C-24,-8 -18,-52 0,-66 C18,-52 24,-8 18,5Z" transform="rotate(0)" />
      <path d="M-18,5 C-24,-8 -18,-52 0,-66 C18,-52 24,-8 18,5Z" transform="rotate(120)" />
      <path d="M-18,5 C-24,-8 -18,-52 0,-66 C18,-52 24,-8 18,5Z" transform="rotate(240)" />
    </g>
    <!-- Inner 3 petals: 60° offset -->
    <g transform="translate(100 100)" opacity="0.84">
      <path d="M-14,5 C-18,-7 -13,-46 0,-60 C13,-46 18,-7 14,5Z" transform="rotate(60)" />
      <path d="M-14,5 C-18,-7 -13,-46 0,-60 C13,-46 18,-7 14,5Z" transform="rotate(180)" />
      <path d="M-14,5 C-18,-7 -13,-46 0,-60 C13,-46 18,-7 14,5Z" transform="rotate(300)" />
    </g>
    <!-- Dark streak marks on inner petals (characteristic alstroemeria detail) -->
    <g transform="translate(100 100)" opacity="0.92">
      <path d="M-2,4 L-3,-28 L0,-42 L3,-28 L2,4Z" transform="rotate(60)" />
      <path d="M-2,4 L-3,-28 L0,-42 L3,-28 L2,4Z" transform="rotate(180)" />
      <path d="M-2,4 L-3,-28 L0,-42 L3,-28 L2,4Z" transform="rotate(300)" />
    </g>
    <!-- Center -->
    <circle cx="100" cy="100" r="13" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="6" fill="white" opacity="0.28" />
  </g>
</svg>
