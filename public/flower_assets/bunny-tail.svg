<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Stem -->
    <path fill="black" opacity="0.82"
      d="M98,178 L97,145 L103,145 L102,178Z" />

    <!-- Main oval body: elongated (rx=22, ry=55) -->
    <ellipse cx="100" cy="90" rx="22" ry="55" fill="black" opacity="0.62" />

    <!-- Fuzzy bumps along perimeter -->
    <!-- Top -->
    <circle cx="100" cy="35"  r="5"   fill="black" opacity="0.84" />
    <circle cx="92"  cy="38"  r="4.5" fill="black" opacity="0.82" />
    <circle cx="108" cy="38"  r="4.5" fill="black" opacity="0.82" />
    <!-- Upper (θ≈40°) -->
    <circle cx="86"  cy="48"  r="4.5" fill="black" opacity="0.80" />
    <circle cx="114" cy="48"  r="4.5" fill="black" opacity="0.80" />
    <!-- Upper-mid (θ≈60°) -->
    <circle cx="81"  cy="63"  r="5"   fill="black" opacity="0.78" />
    <circle cx="119" cy="63"  r="5"   fill="black" opacity="0.78" />
    <!-- Mid-upper (θ≈75°) -->
    <circle cx="78"  cy="76"  r="5"   fill="black" opacity="0.76" />
    <circle cx="122" cy="76"  r="5"   fill="black" opacity="0.76" />
    <!-- Mid (θ=90°) -->
    <circle cx="78"  cy="90"  r="5"   fill="black" opacity="0.74" />
    <circle cx="122" cy="90"  r="5"   fill="black" opacity="0.74" />
    <!-- Mid-lower (θ≈105°) -->
    <circle cx="78"  cy="104" r="5"   fill="black" opacity="0.72" />
    <circle cx="122" cy="104" r="5"   fill="black" opacity="0.72" />
    <!-- Lower-mid (θ≈120°) -->
    <circle cx="81"  cy="118" r="5"   fill="black" opacity="0.70" />
    <circle cx="119" cy="118" r="5"   fill="black" opacity="0.70" />
    <!-- Lower (θ≈140°) -->
    <circle cx="86"  cy="132" r="4.5" fill="black" opacity="0.68" />
    <circle cx="114" cy="132" r="4.5" fill="black" opacity="0.68" />
    <!-- Bottom (θ≈160°) -->
    <circle cx="92"  cy="142" r="4.5" fill="black" opacity="0.66" />
    <circle cx="108" cy="142" r="4.5" fill="black" opacity="0.66" />
    <circle cx="100" cy="145" r="5"   fill="black" opacity="0.64" />

    <!-- Inner texture dots -->
    <circle cx="94"  cy="55"  r="3"   fill="black" opacity="0.76" />
    <circle cx="106" cy="62"  r="3"   fill="black" opacity="0.76" />
    <circle cx="100" cy="75"  r="3.5" fill="black" opacity="0.74" />
    <circle cx="92"  cy="88"  r="3"   fill="black" opacity="0.72" />
    <circle cx="108" cy="95"  r="3"   fill="black" opacity="0.72" />
    <circle cx="100" cy="108" r="3.5" fill="black" opacity="0.70" />
    <circle cx="93"  cy="120" r="3"   fill="black" opacity="0.68" />
    <circle cx="107" cy="128" r="3"   fill="black" opacity="0.68" />
