<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Hyacinth: Dense cluster of small bell-shaped florets (top view) -->
    <!-- Layer 1: Outer ring of florets -->
    <g transform="translate(100 100)" opacity="0.55">
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(0)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(30)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(60)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(90)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(120)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(150)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(180)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(210)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(240)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(270)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(300)" />
      <circle cx="0" cy="-72" r="14" fill="black" transform="rotate(330)" />
    </g>
    <!-- Layer 2: Middle ring of florets -->
    <g transform="translate(100 100)" opacity="0.72">
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(15)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(45)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(75)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(105)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(135)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(165)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(195)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(225)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(255)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(285)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(315)" />
      <circle cx="0" cy="-52" r="15" fill="black" transform="rotate(345)" />
    </g>
    <!-- Layer 3: Inner ring of florets -->
    <g transform="translate(100 100)" opacity="0.88">
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(0)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(45)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(90)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(135)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(180)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(225)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(270)" />
      <circle cx="0" cy="-32" r="14" fill="black" transform="rotate(315)" />
    </g>
    <!-- Center dome -->
    <circle cx="100" cy="100" r="18" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="9" fill="white" opacity="0.28" />
  </g>
</svg>
