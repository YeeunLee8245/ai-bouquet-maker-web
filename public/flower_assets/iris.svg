<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Falls outer: 3 wide petals drooping downward (±40° from down) -->
    <g transform="translate(100 100)" opacity="0.60">
      <path d="M-24,0 C-30,-10 -22,-52 0,-68 C22,-52 30,-10 24,0Z" transform="rotate(140)" />
      <path d="M-24,0 C-30,-10 -22,-52 0,-68 C22,-52 30,-10 24,0Z" transform="rotate(180)" />
      <path d="M-24,0 C-30,-10 -22,-52 0,-68 C22,-52 30,-10 24,0Z" transform="rotate(220)" />
    </g>
    <!-- Falls inner: narrower, more opaque -->
    <g transform="translate(100 100)" opacity="0.78">
      <path d="M-16,0 C-20,-8 -14,-44 0,-58 C14,-44 20,-8 16,0Z" transform="rotate(140)" />
      <path d="M-16,0 C-20,-8 -14,-44 0,-58 C14,-44 20,-8 16,0Z" transform="rotate(180)" />
      <path d="M-16,0 C-20,-8 -14,-44 0,-58 C14,-44 20,-8 16,0Z" transform="rotate(220)" />
    </g>
    <!-- Standards outer: 3 narrow upright petals (±20° from up) -->
    <g transform="translate(100 100)" opacity="0.82">
      <path d="M-12,0 C-14,-10 -9,-48 0,-62 C9,-48 14,-10 12,0Z" transform="rotate(340)" />
      <path d="M-12,0 C-14,-10 -9,-48 0,-62 C9,-48 14,-10 12,0Z" transform="rotate(0)" />
      <path d="M-12,0 C-14,-10 -9,-48 0,-62 C9,-48 14,-10 12,0Z" transform="rotate(20)" />
    </g>
    <!-- Standards inner -->
    <g transform="translate(100 100)" opacity="0.96">
      <path d="M-9,0 C-10,-8 -7,-38 0,-50 C7,-38 10,-8 9,0Z" transform="rotate(340)" />
      <path d="M-9,0 C-10,-8 -7,-38 0,-50 C7,-38 10,-8 9,0Z" transform="rotate(0)" />
      <path d="M-9,0 C-10,-8 -7,-38 0,-50 C7,-38 10,-8 9,0Z" transform="rotate(20)" />
    </g>
    <!-- Center column -->
    <circle cx="100" cy="100" r="10" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="5"  fill="white" opacity="0.25" />
  </g>
</svg>
