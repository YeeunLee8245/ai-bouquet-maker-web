<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Layer 1: 6 outer trumpet petals (60° intervals) -->
    <g transform="translate(100 100)" opacity="0.6">
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(0)" />
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(60)" />
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(120)" />
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(180)" />
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(240)" />
      <path d="M-8,0 C-12,-20 -15,-50 -10,-75 C-5,-85 0,-90 0,-90 C0,-90 5,-85 10,-75 C15,-50 12,-20 8,0 C4,-5 -4,-5 -8,0Z" transform="rotate(300)" />
    </g>
    <!-- Layer 2: 6 inner petals (60° intervals, 30° offset) -->
    <g transform="translate(100 100)" opacity="0.8">
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(30)" />
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(90)" />
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(150)" />
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(210)" />
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(270)" />
      <path d="M-6,0 C-8,-15 -10,-35 -6,-55 C-3,-62 0,-65 0,-65 C0,-65 3,-62 6,-55 C10,-35 8,-15 6,0 C3,-3 -3,-3 -6,0Z" transform="rotate(330)" />
    </g>
    <!-- Stamens -->
    <g transform="translate(100 100)" opacity="0.95">
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(0)" />
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(60)" />
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(120)" />
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(180)" />
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(240)" />
      <ellipse cx="0" cy="-25" rx="3" ry="6" fill="black" transform="rotate(300)" />
    </g>
    <!-- Center -->
    <circle cx="100" cy="100" r="8" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="4" fill="white" opacity="0.3" />
  </g>
</svg>
