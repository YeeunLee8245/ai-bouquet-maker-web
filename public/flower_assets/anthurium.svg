<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Anthurium: Heart/spade-shaped spathe with curved spadix -->
    <!-- Layer 1: Outer spathe - heart with pointed tip -->
    <g transform="translate(100 95)" opacity="0.55">
      <path d="M0,-70 C-25,-70 -50,-60 -65,-35 C-80,-10 -75,25 -55,50 C-35,75 -10,90 0,95 C10,90 35,75 55,50 C75,25 80,-10 65,-35 C50,-60 25,-70 0,-70Z" fill="black" />
    </g>
    <!-- Layer 2: Middle spathe -->
    <g transform="translate(100 95)" opacity="0.72">
      <path d="M0,-55 C-20,-55 -40,-47 -52,-28 C-64,-8 -60,20 -44,40 C-28,60 -8,72 0,76 C8,72 28,60 44,40 C60,20 64,-8 52,-28 C40,-47 20,-55 0,-55Z" fill="black" />
    </g>
    <!-- Layer 3: Inner spathe highlight -->
    <g transform="translate(100 95)" opacity="0.88">
      <path d="M0,-40 C-15,-40 -30,-34 -38,-20 C-46,-6 -44,15 -32,30 C-20,45 -6,54 0,57 C6,54 20,45 32,30 C44,15 46,-6 38,-20 C30,-34 15,-40 0,-40Z" fill="black" />
    </g>
    <!-- Spadix - curved finger emerging from upper area -->
    <g transform="translate(100 95)" opacity="1.0">
      <path d="M-5,-30 C-12,-45 -15,-60 -10,-75 C-5,-82 2,-85 8,-80 C14,-75 18,-65 15,-50 C12,-35 8,-20 5,-15 C2,-12 -2,-18 -5,-30Z" fill="black" />
    </g>
    <!-- Spadix highlight/texture -->
    <g transform="translate(100 95)">
      <ellipse cx="0" cy="-65" rx="4" ry="6" fill="white" opacity="0.35" />
      <ellipse cx="3" cy="-50" rx="3" ry="5" fill="white" opacity="0.28" />
      <ellipse cx="5" cy="-35" rx="2" ry="4" fill="white" opacity="0.22" />
    </g>
    <!-- Spathe vein - curved cylinder -->
    <g transform="translate(100 95)">
      <path d="M0,60 Q-3,30 0,0 Q3,-15 5,-25" stroke="black" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4" />
      <path d="M2,58 Q-1,30 2,2 Q5,-13 7,-23" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2" />
    </g>
  </g>
</svg>
