<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 6 large, broad petals (60° intervals) -->
    <g transform="translate(100 100)" opacity="0.60">
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(0)" />
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(60)" />
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(120)" />
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(180)" />
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(240)" />
      <path d="M-26,0 C-32,-12 -24,-55 0,-70 C24,-55 32,-12 26,0Z" transform="rotate(300)" />
    </g>
    <!-- Inner 6 petals (30° offset) -->
    <g transform="translate(100 100)" opacity="0.82">
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(30)" />
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(90)" />
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(150)" />
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(210)" />
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(270)" />
      <path d="M-18,0 C-22,-10 -16,-42 0,-55 C16,-42 22,-10 18,0Z" transform="rotate(330)" />
    </g>
    <!-- Prominent center: pistil + stamen cluster -->
    <circle cx="100" cy="100" r="22" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="11" fill="white" opacity="0.22" />
  </g>
</svg>
