<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- 5 wide rounded petals at 72° intervals -->
    <g transform="translate(100 100)" opacity="0.62">
      <path d="M-20,4 C-28,-4 -24,-50 0,-62 C24,-50 28,-4 20,4Z" transform="rotate(0)" />
      <path d="M-20,4 C-28,-4 -24,-50 0,-62 C24,-50 28,-4 20,4Z" transform="rotate(72)" />
      <path d="M-20,4 C-28,-4 -24,-50 0,-62 C24,-50 28,-4 20,4Z" transform="rotate(144)" />
      <path d="M-20,4 C-28,-4 -24,-50 0,-62 C24,-50 28,-4 20,4Z" transform="rotate(216)" />
      <path d="M-20,4 C-28,-4 -24,-50 0,-62 C24,-50 28,-4 20,4Z" transform="rotate(288)" />
    </g>

    <!-- Dense stamen bundle: 20 thin stamens at 18° intervals -->
    <g transform="translate(100 100)" opacity="0.90">
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(0)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(18)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(36)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(54)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(72)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(90)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(108)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(126)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(144)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(162)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(180)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(198)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(216)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(234)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(252)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(270)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(288)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(306)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(324)" />
      <path d="M-1,-13 L-1.5,-40 L1.5,-40 L1,-13Z" transform="rotate(342)" />
    </g>

    <!-- Anther dots at stamen tips -->
    <g transform="translate(100 100)" opacity="1.0">
      <circle r="3" transform="rotate(0) translate(0 -40)" />
      <circle r="3" transform="rotate(18) translate(0 -40)" />
      <circle r="3" transform="rotate(36) translate(0 -40)" />
      <circle r="3" transform="rotate(54) translate(0 -40)" />
      <circle r="3" transform="rotate(72) translate(0 -40)" />
      <circle r="3" transform="rotate(90) translate(0 -40)" />
      <circle r="3" transform="rotate(108) translate(0 -40)" />
      <circle r="3" transform="rotate(126) translate(0 -40)" />
      <circle r="3" transform="rotate(144) translate(0 -40)" />
      <circle r="3" transform="rotate(162) translate(0 -40)" />
      <circle r="3" transform="rotate(180) translate(0 -40)" />
      <circle r="3" transform="rotate(198) translate(0 -40)" />
      <circle r="3" transform="rotate(216) translate(0 -40)" />
      <circle r="3" transform="rotate(234) translate(0 -40)" />
      <circle r="3" transform="rotate(252) translate(0 -40)" />
      <circle r="3" transform="rotate(270) translate(0 -40)" />
      <circle r="3" transform="rotate(288) translate(0 -40)" />
      <circle r="3" transform="rotate(306) translate(0 -40)" />
      <circle r="3" transform="rotate(324) translate(0 -40)" />
      <circle r="3" transform="rotate(342) translate(0 -40)" />
    </g>

    <!-- Center pistil -->
    <circle cx="100" cy="100" r="13" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="6"  fill="white" opacity="0.30" />
  </g>
</svg>
