<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Nerine: Spider lily type with curly, reflexed petals -->
    <!-- Layer 1: Outer curly petals (6 petals) -->
    <g transform="translate(100 100)" opacity="0.58">
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(0)" />
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(60)" />
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(120)" />
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(180)" />
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(240)" />
      <path d="M-4,0 C-6,-20 -10,-50 -8,-70 C-5,-80 0,-85 0,-85 C0,-85 5,-80 8,-70 C10,-50 6,-20 4,0 C2,-2 -2,-2 -4,0Z" transform="rotate(300)" />
    </g>
    <!-- Layer 2: Middle reflexed petals (6 petals, offset) -->
    <g transform="translate(100 100)" opacity="0.78">
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(30)" />
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(90)" />
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(150)" />
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(210)" />
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(270)" />
      <path d="M-5,0 C-7,-15 -10,-38 -7,-55 C-4,-64 0,-68 0,-68 C0,-68 4,-64 7,-55 C10,-38 7,-15 5,0 C2,-2 -2,-2 -5,0Z" transform="rotate(330)" />
    </g>
    <!-- Stamens -->
    <g transform="translate(100 100)" opacity="0.95">
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(0)" />
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(60)" />
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(120)" />
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(180)" />
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(240)" />
      <ellipse cx="0" cy="-28" rx="2" ry="5" fill="black" transform="rotate(300)" />
    </g>
    <!-- Center -->
    <circle cx="100" cy="100" r="10" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="5" fill="white" opacity="0.3" />
  </g>
</svg>
