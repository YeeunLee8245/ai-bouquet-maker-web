    <g transform="translate(100 100)" opacity="0.95">
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(22.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(67.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(112.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(157.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(202.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(247.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(292.5)" />
      <path d="M-10,0 C-10,-20 -7,-48 -4,-62 L0,-66 L4,-62 C7,-48 10,-20 10,0Z" transform="rotate(337.5)" />
