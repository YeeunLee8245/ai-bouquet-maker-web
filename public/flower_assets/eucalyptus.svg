<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Eucalyptus: Round leaves arranged in circular pattern (top-down view of leaf cluster) -->
    <!-- Layer 1: Outer round leaves -->
    <g transform="translate(100 100)" opacity="0.58">
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(0)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(45)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(90)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(135)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(180)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(225)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(270)" />
      <ellipse cx="0" cy="-65" rx="22" ry="28" fill="black" transform="rotate(315)" />
    </g>
    <!-- Layer 2: Middle leaves (offset) -->
    <g transform="translate(100 100)" opacity="0.75">
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(22.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(67.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(112.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(157.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(202.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(247.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(292.5)" />
      <ellipse cx="0" cy="-45" rx="18" ry="24" fill="black" transform="rotate(337.5)" />
    </g>
    <!-- Layer 3: Inner leaves -->
    <g transform="translate(100 100)" opacity="0.9">
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(0)" />
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(60)" />
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(120)" />
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(180)" />
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(240)" />
      <ellipse cx="0" cy="-28" rx="14" ry="18" fill="black" transform="rotate(300)" />
    </g>
    <!-- Center stem point -->
    <circle cx="100" cy="100" r="12" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="6" fill="white" opacity="0.3" />
  </g>
</svg>
