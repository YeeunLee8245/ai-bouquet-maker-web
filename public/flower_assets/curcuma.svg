      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(146)" />
      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(191)" />
      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(236)" />
      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(281)" />
      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(326)" />
