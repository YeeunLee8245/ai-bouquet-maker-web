<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 8 bracts (45° intervals) — oval, scale-like -->
    <g transform="translate(100 100)" opacity="0.60">
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(0)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(45)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(90)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(135)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(180)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(225)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(270)" />
      <path d="M-16,0 C-22,-8 -16,-40 0,-48 C16,-40 22,-8 16,0Z" transform="rotate(315)" />
    </g>
    <!-- Middle 8 bracts (22.5° offset) -->
    <g transform="translate(100 100)" opacity="0.76">
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(22.5)" />
