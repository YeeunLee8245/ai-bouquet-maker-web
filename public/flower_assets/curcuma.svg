      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(112.5)" />
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(157.5)" />
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(202.5)" />
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(247.5)" />
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(292.5)" />
      <path d="M-12,0 C-15,-6 -11,-30 0,-36 C11,-30 15,-6 12,0Z" transform="rotate(337.5)" />
    </g>
    <!-- Inner 8 bracts (11° offset) -->
    <g transform="translate(100 100)" opacity="0.90">
      <path d="M-8,0 C-9,-4 -7,-18 0,-22 C7,-18 9,-4 8,0Z" transform="rotate(11)" />
