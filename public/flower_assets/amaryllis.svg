<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 3 petals: very wide trumpet shape at 0°/120°/240° -->
    <g transform="translate(100 100)" opacity="0.60">
      <path d="M-24,6 C-32,-6 -28,-56 0,-70 C28,-56 32,-6 24,6Z" transform="rotate(0)" />
      <path d="M-24,6 C-32,-6 -28,-56 0,-70 C28,-56 32,-6 24,6Z" transform="rotate(120)" />
      <path d="M-24,6 C-32,-6 -28,-56 0,-70 C28,-56 32,-6 24,6Z" transform="rotate(240)" />
    </g>
    <!-- Inner 3 petals: 60° offset, slightly narrower -->
    <g transform="translate(100 100)" opacity="0.82">
      <path d="M-20,6 C-26,-5 -22,-50 0,-64 C22,-50 26,-5 20,6Z" transform="rotate(60)" />
      <path d="M-20,6 C-26,-5 -22,-50 0,-64 C22,-50 26,-5 20,6Z" transform="rotate(180)" />
      <path d="M-20,6 C-26,-5 -22,-50 0,-64 C22,-50 26,-5 20,6Z" transform="rotate(300)" />
    </g>
    <!-- 6 prominent stamens -->
    <g transform="translate(100 100)" opacity="0.94">
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(0)" />
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(60)" />
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(120)" />
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(180)" />
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(240)" />
      <path d="M-1.5,-18 L-2,-46 L2,-46 L1.5,-18Z" transform="rotate(300)" />
    </g>
    <!-- Anther dots at stamen tips -->
    <g transform="translate(100 100)" opacity="1.0">
      <circle r="3.5" transform="rotate(0) translate(0 -46)" />
      <circle r="3.5" transform="rotate(60) translate(0 -46)" />
      <circle r="3.5" transform="rotate(120) translate(0 -46)" />
      <circle r="3.5" transform="rotate(180) translate(0 -46)" />
      <circle r="3.5" transform="rotate(240) translate(0 -46)" />
      <circle r="3.5" transform="rotate(300) translate(0 -46)" />
    </g>
    <!-- Center -->
    <circle cx="100" cy="100" r="18" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="8" fill="white" opacity="0.25" />
  </g>
</svg>
