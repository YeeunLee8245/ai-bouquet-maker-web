<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Globe shape made of overlapping circles - outer layer -->
    <g transform="translate(100 100)" opacity="0.55">
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(0)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(36)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(72)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(108)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(144)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(180)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(216)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(252)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(288)" />
      <circle cx="0" cy="-55" r="18" fill="black" transform="rotate(324)" />
    </g>
    <!-- Middle layer -->
    <g transform="translate(100 100)" opacity="0.75">
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(18)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(54)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(90)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(126)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(162)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(198)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(234)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(270)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(306)" />
      <circle cx="0" cy="-38" r="16" fill="black" transform="rotate(342)" />
    </g>
    <!-- Inner layer -->
    <g transform="translate(100 100)" opacity="0.9">
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(0)" />
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(60)" />
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(120)" />
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(180)" />
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(240)" />
      <circle cx="0" cy="-22" r="14" fill="black" transform="rotate(300)" />
    </g>
    <!-- Center dome -->
    <circle cx="100" cy="100" r="20" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="10" fill="white" opacity="0.2" />
  </g>
</svg>
