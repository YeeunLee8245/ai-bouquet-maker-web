<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="black">
    <!-- Outer 6 petals (60° intervals) — broad, pointed -->
    <g transform="translate(100 100)" opacity="0.65">
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(0)" />
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(60)" />
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(120)" />
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(180)" />
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(240)" />
      <path d="M-18,0 C-22,-15 -14,-55 0,-72 C14,-55 22,-15 18,0Z" transform="rotate(300)" />
    </g>
    <!-- Inner 6 petals (offset 30°) -->
    <g transform="translate(100 100)" opacity="0.85">
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(30)" />
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(90)" />
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(150)" />
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(210)" />
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(270)" />
      <path d="M-13,0 C-16,-12 -10,-42 0,-56 C10,-42 16,-12 13,0Z" transform="rotate(330)" />
    </g>
    <!-- Stamen center -->
    <circle cx="100" cy="100" r="16" fill="black" opacity="1.0" />
    <circle cx="100" cy="100" r="8"  fill="white" opacity="0.28" />
  </g>
</svg>
